stages:
  - deploy

pages:
  stage: deploy
  image: python:3.8.3
  before_script:
    - conda env create -f environment.y
    - conda init bash
    - source ~/.bashrc    # <- !!!
    - conda activate base
  script:
    - cd doc && make html
  after_script:
    - mv doc/build/html/ ./public/
  artifacts:
    paths:
    - public
  rules:
    - if: '$CI_COMMIT_REF_NAME == "samna-dynapse1"'