stages:
  - deploy

pages:
  stage: deploy
  image: python:3.8.3
  before_script:
    - apt-get update && apt-get install make --no-install-recommends -y
    - python -m pip install sphinx sphinx_book_theme sphinx-autodoc-typehints sphinxcontrib-napoleon numpy samna==0.14.10.0 jinja2==3.0.0
  script:
    - cd doc && make html
  after_script:
    - mv doc/build/html/ ./public/
  artifacts:
    paths:
    - public
  rules:
    - if: '$CI_COMMIT_REF_NAME == "samna-dynapse1"'