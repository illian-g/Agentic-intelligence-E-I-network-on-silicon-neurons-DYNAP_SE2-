stages:
  - deploy

pages:
  stage: deploy
  image: python:3.8.3
  before_script:
    - apt-get update && apt-get install make --no-install-recommends -y
    - python -m pip install sphinx sphinx_book_theme sphinx-autodoc-typehints sphinxcontrib-napoleon | 
      pydata-sphinx-theme sphinx-autopackagesummary sphinx-rtd-theme sphinxcontrib-applehelp |
      sphinxcontrib-devhelp sphinxcontrib-htmlhelp sphinxcontrib-jsmath sphinxcontrib-qthelp |
      sphinxcontrib-serializinghtml sphinxcontrib-websupport
  script:
    - cd doc && make html
  after_script:
    - mv doc/build/html/ ./public/
  artifacts:
    paths:
    - public
  rules:
    - if: '$CI_COMMIT_REF_NAME == "samna-dynapse1"'